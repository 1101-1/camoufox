name: Build and Release Windows
on:
  workflow_dispatch:
  push:
    tags:
      - "*"
jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      GIT_AUTHOR_NAME: github-actions[bot]
      GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      GIT_COMMITTER_NAME: github-actions[bot]
      GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"
          verbose: "false"
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up LLVM and build dependencies
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get update
          sudo apt-get install -y \
            lld-18 \
            clang-18 \
            msitools \
            p7zip-full \
            aria2 \
            wget \
            git
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-18 100
      - name: Check disk space
        run: df -h
      - name: Fetch Firefox source
        env:
          CAMOUFOX_PASSWD: ${{ secrets.CAMOUFOX_PASSWD }}
        run: make fetch
      - name: Setup source tree and bootstrap
        run: |
          make setup
          make mozbootstrap
          mkdir -p dist
      - name: Fix missing manifest
        run: |
          if [ ! -f browser/app/camoufox.exe.manifest ]; then
            cp browser/app/firefox.exe.manifest browser/app/camoufox.exe.manifest
          fi
      - name: Create swap space
        run: |
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
      - name: Build Windows x86_64
        run: python3 ./multibuild.py --target windows --arch x86_64
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: camoufox-windows-x86_64
          path: dist/*
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create draft release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
          prerelease: false
